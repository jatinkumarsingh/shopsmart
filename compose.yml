services:
  db:
    profiles: [ "localdb" ]
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopsmart
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5435:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    depends_on:
      db:
        condition: service_healthy
        required: false
    profiles: [ "migrate" ]
    image: ghcr.io/satyamkumarcs/nst_devops-server:latest
    command: "npm run db:migrate:deploy"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/shopsmart

  seed:
    depends_on:
      migrate:
        condition: service_completed_successfully
        required: false
      db:
        condition: service_healthy
        required: false
    profiles: [ "seed" ]
    image: ghcr.io/satyamkumarcs/nst_devops-server:latest
    command: "npm run db:seed"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/shopsmart

  api:
    depends_on:
      db:
        condition: service_healthy
        required: false
      seed:
        condition: service_completed_successfully
        required: false
      migrate:
        condition: service_completed_successfully
        required: false
    image: ghcr.io/satyamkumarcs/nst_devops-server:latest
    restart: unless-stopped
    ports:
      - 5001:8080
    environment:
      PORT: 8080
      DATABASE_URL: postgres://postgres:postgres@db:5432/shopsmart

  web:
    image: ghcr.io/satyamkumarcs/nst_devops-client:latest
    restart: unless-stopped
    ports:
      - 80:80
    environment:
      VITE_API_URL: http://api:8080

volumes:
  postgres_data: null
