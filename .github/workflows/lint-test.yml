name: Lint & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm ci

      - name: Lint Server
        working-directory: ./server
        run: npm run lint

      - name: Install Client Dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint Client
        working-directory: ./client
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm ci

      - name: Run Server Tests
        working-directory: ./server
        run: npm test

      - name: Install Client Dependencies
        working-directory: ./client
        run: npm ci

      - name: Run Client Tests
        working-directory: ./client
        run: npm test
